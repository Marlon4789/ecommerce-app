{% extends "layouts/base.html" %}
{% block title %}Error en el Pago — Kaboha Coffee{% endblock %}
{% block content %}
<section class="payment-error">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="error-card">
          <i class="fa-solid fa-circle-xmark error-icon"></i>
          <h2>Error en el pago</h2>
          <p>{{ error }}</p>
          {% if debug_info %}
            <pre class="debug-box">{{ debug_info }}</pre>
          {% endif %}
          <a href="{% url 'payment:process' %}" class="btn btn-coffee">
            <i class="fa-solid fa-rotate me-2"></i>Intentar nuevamente
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
