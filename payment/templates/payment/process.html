{% extends "layouts/base.html" %}
{% load humanize %}
{% block title %}Proceso de Pago{% endblock %}

{% block content %}

<section class="payment-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5">

<div class="payment-card">

<h2 class="payment-title">
<i class="fa-solid fa-credit-card"></i>
Proceso de pago
</h2>

<p class="payment-total">

Total a pagar

<strong>
${{ order.get_total_cost|floatformat:"0"|intcomma }} COP
</strong>

</p>

<form id="payment-form">

<div id="payment-element"></div>

<div id="payment-errors" style="color: #dc3545; margin-top: 10px; display: none; font-weight: bold;"></div>

<button type="submit" class="btn btn-coffee w-100" id="submit-button" style="margin-top: 20px;">

Proceder al pago

</button>

</form>

</div>

</div>

</div>

</div>

</section>

<!-- Stripe JS -->
<script src="https://js.stripe.com/v3/"></script>

<script>
console.log("✓ Iniciando Stripe Payment Element...");
console.log("✓ Public Key:", '{{ stripe_public_key }}'.substring(0, 20) + "...");
console.log("✓ Client Secret:", '{{ client_secret }}'.substring(0, 30) + "...");

// ✅ Inicializar Stripe
const stripe = Stripe('{{ stripe_public_key }}');
console.log("✓ Stripe inicializado");

// ✅ Crear elements con clientSecret
const elements = stripe.elements({
    clientSecret: '{{ client_secret }}'
});
console.log("✓ Elements creados");

// ✅ Montar Payment Element
const paymentElement = elements.create('payment');
paymentElement.mount('#payment-element');
console.log("✓ Payment Element montado");

// ✅ Referencias a elementos
const form = document.getElementById('payment-form');
const submitButton = document.getElementById('submit-button');
const paymentErrorsDiv = document.getElementById('payment-errors');

// ✅ Manejador de submit
form.addEventListener('submit', async (event) => {
    console.log("✓ Form submitted!");
    event.preventDefault();
    submitButton.disabled = true;
    submitButton.textContent = 'Procesando pago...';
    paymentErrorsDiv.style.display = 'none';

    try {
        console.log("✓ Confirmando pago con Stripe...");
        
        // ✅ Confirmar el pago
        const { error } = await stripe.confirmPayment({
            elements,
            confirmParams: {
                return_url: '{{ return_url }}',
            },
        });

        // ✅ Manejo de errores
        if (error) {
            console.error('❌ Error:', error.message);
            paymentErrorsDiv.textContent = '❌ Error: ' + error.message;
            paymentErrorsDiv.style.display = 'block';
            submitButton.disabled = false;
            submitButton.textContent = 'Proceder al pago';
        }
    } catch (error) {
        console.error('❌ Error general:', error);
        paymentErrorsDiv.textContent = '❌ Error: ' + error.message;
        paymentErrorsDiv.style.display = 'block';
        submitButton.disabled = false;
        submitButton.textContent = 'Proceder al pago';
    }
});

console.log("✓ Stripe Payment Element completamente iniciado");
</script>

{% endblock %}
