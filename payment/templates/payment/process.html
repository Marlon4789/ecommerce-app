{% extends "layouts/base.html" %}
{% load humanize %}
{% block title %}Proceso de Pago — Kaboha Coffee{% endblock %}

{% block content %}

<section class="payment-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">

        <div class="text-center mb-4">
          <span class="catalog-hero-label">
            <i class="fa-solid fa-lock me-1"></i> Pago seguro
          </span>
        </div>

        <div class="payment-card">

          <h2 class="payment-title">
            <i class="fa-solid fa-credit-card"></i> Proceso de pago
          </h2>

          <p class="payment-total">
            Total a pagar
            <strong>${{ order.get_total_cost|floatformat:"0"|intcomma }} COP</strong>
          </p>

          <form id="payment-form">
            <div id="payment-element"></div>
            <div id="payment-errors" class="checkout-error mt-2" style="display:none;"></div>
            <button type="submit" class="btn btn-coffee w-100 mt-4" id="submit-button">
              <i class="fa-solid fa-lock me-2"></i>Proceder al pago
            </button>
          </form>

          <p class="checkout-security-note mt-3">
            <i class="fa-solid fa-shield-halved me-1"></i>
            Tus datos están protegidos con cifrado SSL
          </p>

        </div>
      </div>
    </div>
  </div>
</section>

<script src="https://js.stripe.com/v3/"></script>
<script>
  const stripe   = Stripe('{{ stripe_public_key }}');
  const elements = stripe.elements({ clientSecret: '{{ client_secret }}' });
  const paymentElement = elements.create('payment');
  paymentElement.mount('#payment-element');

  const form        = document.getElementById('payment-form');
  const submitBtn   = document.getElementById('submit-button');
  const errorsDiv   = document.getElementById('payment-errors');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Procesando...';
    errorsDiv.style.display = 'none';

    const { error } = await stripe.confirmPayment({
      elements,
      confirmParams: { return_url: '{{ return_url }}' },
    });

    if (error) {
      errorsDiv.textContent = error.message;
      errorsDiv.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fa-solid fa-lock me-2"></i>Proceder al pago';
    }
  });
</script>

{% endblock %}
